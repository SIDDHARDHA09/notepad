<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindVault | Your Digital Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        roboto: ['Roboto', 'sans-serif'],
                        openSans: ['Open Sans', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                        lora: ['Lora', 'serif'],
                        jetbrains: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                        'premium': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                        'glow': '0 0 20px rgba(99, 102, 241, 0.15)',
                    }
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Lora:wght@400;700&family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mesh-light: radial-gradient(at 0% 0%, hsla(225,39%,90%,1) 0, transparent 50%), 
                             radial-gradient(at 50% 0%, hsla(225,39%,95%,1) 0, transparent 50%), 
                             radial-gradient(at 100% 0%, hsla(225,39%,90%,1) 0, transparent 50%);
            --bg-mesh-dark: radial-gradient(at 0% 0%, hsla(230,30%,10%,1) 0, transparent 50%), 
                            radial-gradient(at 50% 0%, hsla(230,30%,15%,1) 0, transparent 50%), 
                            radial-gradient(at 100% 0%, hsla(230,30%,10%,1) 0, transparent 50%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
            @apply transition-colors duration-500 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100;
        }
        .light body { background-image: var(--bg-mesh-light); }
        .dark body { background-image: var(--bg-mesh-dark); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            @apply bg-slate-200 dark:bg-slate-800 rounded-full hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors;
        }

        .glass-panel {
            @apply bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl border border-white/20 dark:border-slate-800/30 shadow-glass;
        }

        .premium-card {
            @apply bg-white dark:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50 shadow-sm hover:shadow-premium hover:-translate-y-1.5 transition-all duration-500;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .float-animation { animation: float 6s ease-in-out infinite; }

        .editor-image {
            @apply rounded-[2rem] shadow-2xl my-8 mx-auto transition-transform duration-500 hover:scale-[1.02];
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
